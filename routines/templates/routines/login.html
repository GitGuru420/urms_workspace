{% extends 'routines/base.html' %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 max-w-md w-full space-y-6">
        
        <div class="text-center space-y-2">
            <span class="text-[10px] font-bold uppercase tracking-widest bg-slate-100 text-slate-800 px-2.5 py-1 rounded-full">Secure Gateway</span>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">URMS Portal Sign-In</h1>
            <p class="text-xs text-gray-500">Enter credentials assigned by your system controller unit.</p>
        </div>

        <form method="POST" action="{% url 'login' %}" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Username / User ID</label>
                <input type="text" name="username" required autocomplete="username"
                       class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all placeholder:text-gray-400"
                       placeholder="e.g., admin_cse or teacher_id">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-600 mb-2">Account Password</label>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all placeholder:text-gray-400"
                       placeholder="••••••••">
            </div>

            <div class="pt-4 space-y-3">
                <button type="submit" 
                        class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-xl text-xs uppercase tracking-wider transition-all shadow-md active:scale-[0.99]">
                    Sign-In
                </button>
                
                <a href="{% url 'landing_page' %}" 
                   class="group block relative bg-gray-100 p-4 rounded-xl shadow-sm border border-gray-200 hover:shadow-xl hover:border-blue-300 transition-all duration-300 overflow-hidden text-sm font-extrabold text-slate-900 text-center uppercase tracking-wider">
                    Homepage
                </a>
            </div>
        </form>

    </div>
</div>
{% endblock content %}
