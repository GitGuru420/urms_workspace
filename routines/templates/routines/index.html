{% extends 'routines/base.html' %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center space-y-12 py-10">
    
    <div class="max-w-3xl space-y-6">
        <h1 class="text-5xl md:text-6xl font-black text-slate-900 tracking-tight leading-tight">
            University Routine <br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-emerald-500">Management System</span>
        </h1>
        <p class="text-sm text-gray-500 font-medium max-w-xl mx-auto">
            A centralized workspace for dynamic schedule tracking, automated conflict resolution, and seamless academic planning.
        </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl px-4">
        
        <a href="{% url 'view_routine' %}" class="group relative bg-white p-4 rounded-3xl shadow-sm border border-gray-200 hover:shadow-xl hover:border-emerald-300 transition-all duration-300 text-left overflow-hidden">
            <h2 class="text-xl font-extrabold text-slate-900 text-center">View Class Routine</h2>
        </a>

        <a href="{% url 'login' %}" class="group relative bg-white p-4 rounded-3xl shadow-sm border border-gray-200 hover:shadow-xl hover:border-blue-300 transition-all duration-300 text-left overflow-hidden">
            <h2 class="text-xl font-extrabold text-slate-900 text-center">Administrative Portal</h2>
        </a>

    </div>
</div>
{% endblock content %}
